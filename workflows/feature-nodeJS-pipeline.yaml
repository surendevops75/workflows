# Pipeline Flow

```text
Checkout Code
      │
      ▼
Generate Version
      │
      ▼
Install Dependencies
      │
      ▼
Unit Tests
      │
      ▼
Update GitHub Status
      │
      ▼
Docker Build
      │
      ▼
Update GitHub Status
      │
      ▼
Trivy Security Scan
      │
      ▼
Update GitHub Status
      │
      ▼
AWS Authentication
      │
      ▼
Push Docker Image to ECR
```

