# Key Concepts Demonstrated

### Reusable Workflows

```yaml
workflow_call
```

Allows multiple repositories to use a common CI pipeline.

---

### Versioning Strategy

```bash
APP_VERSION=${GITHUB_SHA::9}
```

Uses commit SHA as image version.

Example:

```text
Commit SHA:
4d9c31a7d4a8d2f

Image Version:
4d9c31a7d
```

---

### Commit Status Checks

Creates custom GitHub status checks:

```text
UNIT_TESTS
DOCKER_BUILD
SECURITY_CHECK
```

Visible directly in Pull Requests and Commits.

---

### Container Security

Uses:

- :contentReference[oaicite:0]{index=0}

to detect:

- Critical Vulnerabilities
- High Vulnerabilities
- Medium Vulnerabilities

before deployment.

---

### Container Registry

Pushes Docker images to:

- :contentReference[oaicite:1]{index=1}

using versioned image tags.

